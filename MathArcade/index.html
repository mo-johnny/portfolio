<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro Math Arcade</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#f9f906",
              "arcade-grey": "#2d2d3a",
              "arcade-purple": "#1a0b2e",
              "neon-pink": "#ff00ff",
              "neon-teal": "#00ffff",
              "neon-yellow": "#f9f906",
            },
            fontFamily: {
              pixel: ["'Press Start 2P'", "cursive"],
              display: ["Space Grotesk"],
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      @layer utilities {
        .starfield-bg {
          background: radial-gradient(circle at center, #1a0b2e 0%, #05020a 100%);
        }
        .stars-layer {
          position: absolute;
          inset: 0;
          background-repeat: repeat;
          pointer-events: none;
        }
        .stars-1 {
          background-image: radial-gradient(
              1px 1px at 20px 30px,
              #eee,
              transparent
            ),
            radial-gradient(1px 1px at 150px 150px, #fff, transparent);
          background-size: 200px 200px;
        }
        .scanline-overlay {
          background: linear-gradient(
              rgba(18, 16, 16, 0) 50%,
              rgba(0, 0, 0, 0.15) 50%
            ),
            linear-gradient(
              90deg,
              rgba(255, 0, 0, 0.02),
              rgba(0, 255, 0, 0.01),
              rgba(0, 255, 0, 0.02)
            );
          background-size: 100% 4px, 4px 100%;
          pointer-events: none;
        }
        .pixel-border {
          box-shadow: -6px 0 0 0 #000, 6px 0 0 0 #000, 0 -6px 0 0 #000,
            0 6px 0 0 #000;
        }
        .neon-glow-pink {
          text-shadow: 0 0 15px #ff00ff, 0 0 30px #ff00ff;
        }
        .neon-glow-yellow {
          box-shadow: 0 0 40px rgba(249, 249, 6, 0.6);
        }
        .game-card-active {
          transform: scale(1.1);
          z-index: 10;
          border-color: #ff00ff;
          box-shadow: 0 0 50px rgba(255, 0, 255, 0.4);
        }
        .game-card-inactive {
          filter: brightness(0.4) grayscale(0.7);
          transform: scale(0.9);
        }
        .outer-frame {
          border: 48px solid #2d2d3a;
          background-color: #1a0b2e;
        }
      }
    </style>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
      .material-symbols-outlined {
        font-family: "Material Symbols Outlined";
        font-weight: 100 700;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
      }
    </style>
  </head>
  <body
    class="bg-black font-pixel text-white min-h-screen overflow-hidden antialiased select-none flex items-center justify-center p-0 md:p-8"
  >
    <div class="crt-overlay"></div>
    <div id="app" class="math-arcade-menu">
      <div class="sel-frame">
        <header class="sel-header">
          <h1 class="sel-header-title">MATH ARCADE</h1>
          <div class="sel-header-line"></div>
        </header>
        <main class="sel-main">
          <div class="sel-starfield"></div>
          <div class="sel-scanline"></div>
          <div class="sel-cards-row">
            <div class="sel-card sel-card--side sel-card--inactive" data-action="prev">
              <span class="material-symbols-outlined">swords</span>
              <span class="sel-card-title">MATH WAR</span>
            </div>
            <div class="sel-card sel-card--active">
              <div class="sel-card-inner">
                <div class="sel-icon-box">
                  <span class="material-symbols-outlined">psychology</span>
                </div>
                <h2 class="sel-card-title">MEMORY</h2>
              </div>
            </div>
            <div class="sel-card sel-card--side sel-card--inactive" data-action="next">
              <span class="material-symbols-outlined">grid_on</span>
              <span class="sel-card-title">BINGO</span>
            </div>
          </div>
          <button type="button" id="arcade-start" class="sel-btn-start" onclick="window.__mathArcadeStart && window.__mathArcadeStart(); return false;">
            <span class="material-symbols-outlined">play_arrow</span>
            START GAME
          </button>
          <div class="sel-arrows-wrap">
            <button type="button" id="arcade-prev" class="sel-btn-arrow" aria-label="Previous game">
              <span class="material-symbols-outlined">chevron_left</span>
            </button>
            <button type="button" id="arcade-next" class="sel-btn-arrow" aria-label="Next game">
              <span class="material-symbols-outlined">chevron_right</span>
            </button>
          </div>
        </main>
        <footer class="sel-footer">
          <div class="sel-footer-dots">
            <span class="sel-footer-dot"></span>
            <span class="sel-footer-dot"></span>
            <span class="sel-footer-dot"></span>
          </div>
          <div class="sel-footer-status">System Status: Ready</div>
        </footer>
      </div>
    </div>
    <script>
      // Carousel fallback: run even if main.js fails to load
      (function () {
        var app = document.getElementById("app");
        if (!app) return;
        var games = [
          { shortTitle: "MEMORY", icon: "psychology" },
          { shortTitle: "MATH WAR", icon: "swords" },
          { shortTitle: "BINGO", icon: "grid_on" },
        ];
        var menuIndex = 0;
        function updateCarousel() {
          var row = app.querySelector(".sel-cards-row");
          if (!row) return;
          var cards = row.querySelectorAll(".sel-card");
          if (cards.length !== 3) return;
          var prevI = (menuIndex - 1 + 3) % 3;
          var nextI = (menuIndex + 1) % 3;
          var left = cards[0];
          var center = cards[1];
          var right = cards[2];
          if (left) {
            var icon = left.querySelector(".material-symbols-outlined");
            var title = left.querySelector(".sel-card-title");
            if (icon) icon.textContent = games[prevI].icon;
            if (title) title.textContent = games[prevI].shortTitle;
          }
          if (center) {
            var icon = center.querySelector(".material-symbols-outlined");
            var title = center.querySelector(".sel-card-title");
            if (icon) icon.textContent = games[menuIndex].icon;
            if (title) title.textContent = games[menuIndex].shortTitle;
          }
          if (right) {
            var icon = right.querySelector(".material-symbols-outlined");
            var title = right.querySelector(".sel-card-title");
            if (icon) icon.textContent = games[nextI].icon;
            if (title) title.textContent = games[nextI].shortTitle;
          }
        }
        function setMenuIndexForStart() {
          app.dataset.menuIndex = menuIndex;
        }
        app.addEventListener("click", function (e) {
          if (e.target.closest("#arcade-prev") || e.target.closest("[data-action=prev]")) {
            menuIndex = (menuIndex - 1 + 3) % 3;
            updateCarousel();
            setMenuIndexForStart();
            e.preventDefault();
          } else if (e.target.closest("#arcade-next") || e.target.closest("[data-action=next]")) {
            menuIndex = (menuIndex + 1) % 3;
            updateCarousel();
            setMenuIndexForStart();
            e.preventDefault();
          } else if (e.target.closest("#arcade-start")) {
            e.preventDefault();
            setMenuIndexForStart();
            if (typeof window.__mathArcadeStart === "function") {
              window.__mathArcadeStart();
            } else {
              app.innerHTML = "<div style=\"padding:2rem;color:#fff;font-family:system-ui;text-align:center;\">Game script not loaded. Check console for errors.</div>";
            }
          }
        });
      })();
    </script>
    <script src="./main.js"></script>
  </body>
</html>
